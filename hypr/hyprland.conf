# ──────────────────────────────────────────────────────────────────────────
#  °˖* ૮(  • ᴗ ｡)っ🍸  pewdiepie/archdaemon/dionysh shhheersh
#  Hyprland config 
#  vers. 1.0
# ──────────────────────────────────────────────────────────────────────────

# ── MONITORS ───────────────────────────────────────────────────────────────
monitor = DP-2, 2560x1440@165, 1920x0, 1
monitor = HDMI-A-1, 1920x1080@120, 0x0, 1


# ── MY PROGRAMS ────────────────────────────────────────────────────────────
$terminal    = alacritty
$fileManager = nautilus
$menu        = rofi

# ── AUTOSTART ──────────────────────────────────────────────────────────────


# FIREFOX PRELOAD - fast firefox bööt, just hide workspace 9.
exec-once = hyprctl dispatch exec '[workspace 9 silent] firefox --new-instance'
exec-once = conky
exec-once = systemctl --user start hyprpolkitagent
exec-once = uwsm app -- swaync
exec-once = ~/.config/hypr/scripts/waybar_watcher.sh &


# ── ENVIRONMENT VARIABLES ──────────────────────────────────────────────────
env = XCURSOR_SIZE,25
env = HYPRCURSOR_SIZE,25
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_DPI_SCALE,1
env = XFT_DPI,96
env = XFT_FONT,GohuFont-11

xwayland {
  force_zero_scaling = true
}


# ── LOOK AND FEEL ──────────────────────────────────────────────────────────
general {
    col.active_border   = rgba(9cdef2ff)
    col.inactive_border = rgba(444444ff)
    gaps_in             = 5
    gaps_out            = 20
    border_size         = 2

    col.active_border   = rgba(61afefff)   # Blue for focused windows
    col.inactive_border = rgba(444444ff)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

# ── DECORATION ─────────────────────────────────────────────────────────────
decoration {
    rounding       = 1
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 5
        render_power = 4
        color        = rgba(1fbeffee)
    }

    blur {
        size        = 2
        passes      = 1
        brightness  = 0.4
    }
}

# ── ANIMATIONS ─────────────────────────────────────────────────────────────
animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# ── LAYOUTS ────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

# ── INPUT ──────────────────────────────────────────────────────────────────
input {
    kb_layout  = us, ru
    kb_variant =
    kb_model   =
    kb_options = grp:alt_shift_toggle
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

device {
    name        = logitech-g102-lightsync-gaming-mouse
    sensitivity = -0.5
}

# ── KEYBINDINGS ────────────────────────────────────────────────────────────
$mainMod = SUPER L
$mod     = SUPER


# Apps
bind = SUPER, T, exec, $terminal
bind = SUPER, B, exec, firefox
bind = SUPER, E, exec, thunar
bind = SUPER, Q, killactive,
bind = SUPER, V, togglefloating,
bind = SUPER, {, pseudo,
bind = SUPER, J, togglesplit,
bind = SUPER, SPACE, exec, rofi -show drun

# Power menu
bind = CTRL ALT, Delete, exec, /home/enainandreev/.config/waybar/scripts/powermenu.sh

# Move focus
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Screenshot
bind = ALT, P, exec, slurp | tee >(grim -g "$(cat)" "$HOME/Pictures/Screenshots/screenshot-$(date +'%Y-%m-%d-%H%M%S').png") | grim -g "$(cat)" - | wl-copy


# Touchpad / Monitor
bind = , XF86Display,       exec, hyprctl dispatch cyclenextmonitor
bind = CTRL ALT, L ,      exec, hyprlock

# Workspaces
bind = ALT, 1, movetoworkspace, 1
bind = ALT, 2, movetoworkspace, 2
bind = ALT, 3, movetoworkspace, 3
bind = ALT, 4, movetoworkspace, 4
bind = ALT, 5, movetoworkspace, 5
bind = ALT, 6, movetoworkspace, 6
bind = ALT, 9, movetoworkspace, 9 #Kept hidden as "workspace for background tasks".
bind = SUPER, F, fullscreen

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 9, workspace, 9

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Multimedia keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,  exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# ── WINDOWS AND WORKSPACES ────────────────────────────────────────────────
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
windowrule {
  name = windowrule-1
  no_focus = on
  border_size = 0
  no_shadow = on
  match:class = ^(conky)$
}

workspace=1,persistent:true
workspace=2,persistent:true
workspace=3,persistent:true
workspace=4,persistent:true
workspace=9,persistent:true

workspace=5,persistent:true
workspace=6,persistent:true

workspace=1,monitor:DP-2
workspace=2,monitor:DP-2
workspace=3,monitor:DP-2
workspace=4,monitor:DP-2
workspace=9,monitor:DP-2
workspace=5,monitor:HDMI-A-1
workspace=6,monitor:HDMI-A-1

